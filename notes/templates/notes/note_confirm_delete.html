{% extends 'notes/base.html' %}

{% block title %}Удаление заметки{% endblock %}

{% block content %}
<div class="delete-confirm">
    <h1>Удаление заметки</h1>
    
    <p>Вы уверены, что хотите удалить заметку <strong>"{{ note.title }}"</strong>?</p>
    <p class="warning">Это действие нельзя отменить.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Да, удалить</button>
        <a href="{% url 'notes:note_detail' note.id %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
